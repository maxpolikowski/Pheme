<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Sekcje</title>
    <style>
        
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* GÓRNY PASEK */
        .header-bar {
            width: 100%;
            max-width: 1200px;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            color: #333;
            font-size: 1.2rem;
        }

        /* GŁÓWNY UKŁAD (CSS Grid) */
        .layout-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 40px;
            width: 100%;
            max-width: 1200px;
            align-items: start; 
        }

        /* --- LEWA KOLUMNA (Dynamiczne Kaczki) --- */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden; 
        }

        .duck-box {
            text-align: center;
            width: 100%;
        }

        .duck-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .duck-img:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        /* --- PRAWA KOLUMNA (Zawartość) --- */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Panele akcji */
        .action-panel {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .action-panel.admin-only {
            display: none; 
            border-left: 5px solid var(--red-header);
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .input-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            flex-grow: 1;
            font-size: 1rem;
        }

        .btn {
            padding: 10px 20px;
            background: var(--primary-green);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
        }
        .btn:hover { background: #00b347; }
        
        .btn-admin { background: var(--dark-gray); }
        .btn-admin:hover { background: #555; }

        /* Lista Sekcji */
        .sections-list {
            background: white;
            padding: 0;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* Nowy kolor dla nauczyciela (np. niebieski lub fioletowy) */
        .role-nauczyciel { 
            background: #f0ebff; 
            color: #6c5ce7; 
        }

        .section-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 25px; /* Trochę większy padding dla lepszej klikalności */
            border-bottom: 1px solid #eee;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            cursor: pointer;
            border-radius: 8px; /* Lekkie zaokrąglenie wewnątrz listy */
            margin: 5px 10px;
        }

        .section-item:hover {
            background: #f0fdf4; /* Jasnozielony hover */
            transform: translateX(5px); /* Delikatny efekt wysunięcia */
            box-shadow: -5px 0 0 var(--primary-green); /* Zielony pasek z boku */
        }
        .section-item:last-child {
            border-bottom: none;
        }

        .role-badge {
            font-size: 0.9rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 15px;
        }
        .role-admin { background: #ffebeb; color: var(--red-header); }
        .role-user { background: #e6ffe6; color: var(--primary-green); }

        .empty-state {
            padding: 20px;
            text-align: center;
            color: #888;
            font-style: italic;
        }

    </style>
</head>
<body>

<div class="header-bar">Pheme sekcje</div>

<div class="layout-container">
    
    <div class="sidebar" id="duckSidebar">
        </div>

    <div class="main-content" id="mainContent">
        
        <div id="adminCreatePanel" class="action-panel admin-only">
            <div>
                <strong>Panel Administratora</strong><br>
                <span style="font-size: 0.9rem; color: #666;">Możesz tworzyć nowe sekcje na platformie.</span>
            </div>
            <a href="tworzsekcje.html" class="btn btn-admin">Stwórz nową sekcję</a>
        </div>

        <div class="action-panel">
            <div style="flex-basis: 100%; margin-bottom: 5px;">
                <strong>Dołącz do istniejącej sekcji</strong>
            </div>
            <div class="input-group">
                <input type="text" id="joinSectionCode" placeholder="Podaj kod sekcji (np. 213767)">
                <button class="btn" onclick="dolaczDoSekcji()">Dodaj</button>
            </div>
        </div>

        <div class="sections-list" id="listaSekcji">
            <div class="empty-state">Ładowanie Twoich sekcji...</div>
        </div>

    </div>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");

    if (!token) window.location.href = "index.html";

    async function inicjalizujStrone() {
        try {
            // 1. Sprawdzanie roli
            const resProfil = await fetch(`${API_URL}/profil`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (resProfil.ok) {
                const data = await resProfil.json();
                if (data.role === "admin") {
                    document.getElementById("adminCreatePanel").style.display = "flex";
                }
            }

            // 2. Pobieranie sekcji (ODBLOKOWANE I NAPRAWIONE)
            const resSekcje = await fetch(`${API_URL}/moje-sekcje`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (resSekcje.ok) {
                const sekcje = await resSekcje.json();
                wypiszSekcje(sekcje);
            }
            generujKaczki();
        } catch (e) {
            console.error("Błąd:", e);
        }
    }

    function wypiszSekcje(sekcje) {
        const lista = document.getElementById("listaSekcji");
        lista.innerHTML = "";
        if (!sekcje || sekcje.length === 0) {
            lista.innerHTML = `<div class="empty-state">Nie należysz do żadnej sekcji.</div>`;
            return;
        }

        sekcje.forEach(sekcja => {
            let klasaRoli = sekcja.rola === "nauczyciel" ? "role-nauczyciel" : "role-user";
            const html = `
                <div class="section-item" onclick="window.location.href='widok-sekcji.html?kod=${sekcja.kod}'">
                    <span>${sekcja.name}</span>
                    <span class="role-badge ${klasaRoli}">${sekcja.rola}</span>
                </div>`;
            lista.insertAdjacentHTML('beforeend', html);
        });
    }

    async function dolaczDoSekcji() {
        const kod = document.getElementById("joinSectionCode").value.trim();
        if(!kod) return alert("Wpisz kod!");

        const res = await fetch(`${API_URL}/join-section`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token 
            },
            body: JSON.stringify({ code: kod })
        });
        const data = await res.json();
        alert(data.message);
        if(res.ok) location.reload();
    }

    // Twoja funkcja generujKaczki zostaje bez zmian...
    window.onload = inicjalizujStrone;
</script>

</body>
</html>
