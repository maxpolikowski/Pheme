<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Wiadomości</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
            --blue-msg: #007bff;
            --purple-msg: #6f42c1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 20px;
        }

        .nav-menu {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .nav-btn {
            padding: 10px 20px;
            background: var(--dark-gray);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
        }

        .content-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .thread-item {
            border-left: 5px solid #ccc;
            background: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        /* Kolory dla ról */
        .role-sent { border-left-color: var(--purple-msg); }
        .role-received { border-left-color: var(--blue-msg); }

        .q-new-indicator {
            border-left-width: 10px !important;
            border-left-color: #ff3b3b !important;
            background-color: #fff5f5 !important;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-right: 5px;
        }
        .badge-sent { background: #e2d9f3; color: var(--purple-msg); }
        .badge-received { background: #d9e9ff; color: var(--blue-msg); }
        .badge-new { background: #ff3b3b; color: white; margin-left: 10px; }

        .section-tag {
            background: #eee;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #666;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
            resize: vertical;
        }

        .btn-reply {
            background: var(--dark-gray);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 5px;
        }

        .reply-box {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.9rem;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="header-bar">Pheme - Centrum Wiadomości</div>

<div class="container">
    <div class="nav-menu">
        <button class="nav-btn" onclick="location.href='start.html'">Start</button>
        <button class="nav-btn" onclick="location.href='sekcje.html'">Sekcje</button>
        <button class="nav-btn" onclick="location.href='notatki.html'">Notatki</button>
        <button class="nav-btn" onclick="location.href='pytania.html'" style="background: var(--primary-green);">Pytania</button>
        <button class="nav-btn" onclick="location.href='profil.html'">Profil</button>
    </div>

    <div class="content-card">
        <h2 style="margin-top:0">Twoja skrzynka</h2>
        <div id="pytania-global-list">Ładowanie wszystkich wiadomości...</div>
    </div>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        
        try {
            const profRes = await fetch(`${API_URL}/profil`, { headers: { "Authorization": "Bearer " + token } });
            const profil = await profRes.json();
            const myUsername = profil.username;

            const sekcjeRes = await fetch(`${API_URL}/moje-sekcje`, { headers: { "Authorization": "Bearer " + token } });
            const sekcje = await sekcjeRes.json();

            let allQuestions = [];

            // Pobieranie danych ze wszystkich sekcji
            const promises = sekcje.map(async (s) => {
                const qRes = await fetch(`${API_URL}/section-questions/${s.kod}`, { headers: { "Authorization": "Bearer " + token } });
                const questions = await qRes.json();
                
                return questions
                    // FILTR: Pytania wysłane PRZEZ MNIE lub DO MNIE
                    .filter(q => q.fromUsername === myUsername || q.to.includes(myUsername))
                    .map(q => ({ ...q, sectionName: s.name, sectionKod: s.kod }));
            });

            const results = await Promise.all(promises);
            allQuestions = results.flat();

            // Logika "Nowości" i sortowanie
            allQuestions = allQuestions.map(q => {
                const storageKey = `seen_${myUsername}_${q.sectionKod}`;
                const seenData = JSON.parse(localStorage.getItem(storageKey) || "{}");
                
                const currentTotal = 1 + (q.replies ? q.replies.length : 0);
                const lastSeenCount = seenData[q.id] || 0;
                
                const lastMsg = q.replies && q.replies.length > 0 ? q.replies[q.replies.length - 1] : q;
                
                // Nowa, jeśli licznik się zwiększył I ostatnia wiadomość nie jest od nas
                const isNew = currentTotal > lastSeenCount && lastMsg.fromUsername !== myUsername;
                
                return { ...q, isNew, currentTotal };
            });

            // Sortowanie: Nowe na górę, potem najnowsza data
            allQuestions.sort((a, b) => (b.isNew - a.isNew) || (b.id - a.id));

            renderujPytania(allQuestions, myUsername);

        } catch (e) {
            console.error(e);
            document.getElementById('pytania-global-list').innerHTML = "Błąd połączenia z serwerem.";
        }
    }

    function renderujPytania(questions, myUsername) {
        const container = document.getElementById('pytania-global-list');
        if (questions.length === 0) {
            container.innerHTML = "<p>Nie masz żadnych wiadomości.</p>";
            return;
        }

        container.innerHTML = questions.map(q => {
            const isFromMe = q.fromUsername === myUsername;
            const roleClass = isFromMe ? 'role-sent' : 'role-received';
            const roleBadge = isFromMe ? '<span class="badge badge-sent">Wysłane</span>' : '<span class="badge badge-received">Odebrane</span>';
            const newClass = q.isNew ? 'q-new-indicator' : '';
            const newBadge = q.isNew ? '<span class="badge badge-new">NOWA WIADOMOŚĆ</span>' : '';

            return `
                <div class="thread-item ${roleClass} ${newClass}" onclick="oznaczPrzeczytane('${q.sectionKod}', '${q.id}', ${q.currentTotal}, '${myUsername}')">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            ${roleBadge}
                            <span class="section-tag">${q.sectionName}</span>
                        </div>
                        <small style="color:#aaa">${q.date}</small>
                    </div>
                    <h3 style="margin:12px 0 5px 0;">${q.subject} ${newBadge}</h3>
                    <p style="margin:0 0 15px 0; color:#333;"><strong>${q.from}:</strong> ${q.text}</p>
                    
                    <div style="margin-left:10px; padding-left:15px; border-left: 2px solid #eee;">
                        ${(q.replies || []).map(r => `
                            <div class="reply-box">
                                <strong>${r.from}:</strong> ${r.text}
                            </div>
                        `).join('')}
                    </div>

                    <div style="margin-top:15px; display:flex; gap:10px;" onclick="event.stopPropagation()">
                        <textarea id="reply-input-${q.id}" placeholder="Napisz odpowiedź..."></textarea>
                        <button class="btn-reply" onclick="wyslijOdpowiedz('${q.sectionKod}', '${q.id}')">Odpowiedz</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    async function wyslijOdpowiedz(kod, questionId) {
        const text = document.getElementById(`reply-input-${questionId}`).value.trim();
        if (!text) return alert("Wpisz treść wiadomości!");

        try {
            const res = await fetch(`${API_URL}/reply-question`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, questionId: questionId, text: text })
            });
            if (res.ok) {
                document.getElementById(`reply-input-${questionId}`).value = "";
                inicjalizuj();
            }
        } catch (e) { alert("Błąd serwera."); }
    }

    function oznaczPrzeczytane(kod, qId, count, user) {
        const key = `seen_${user}_${kod}`;
        const data = JSON.parse(localStorage.getItem(key) || "{}");
        data[qId] = count;
        localStorage.setItem(key, JSON.stringify(data));
        inicjalizuj();
    }

    window.onload = inicjalizuj;
</script>

</body>
</html>
