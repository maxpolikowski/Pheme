<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Widok Sekcji</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
            --blue-feedback: #007bff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 30px;
            position: relative;
        }

        .section-badge {
            position: absolute;
            top: -10px;
            right: 0;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-right: 4px solid var(--primary-green);
            font-weight: bold;
            color: var(--dark-gray);
            font-size: 0.9rem;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-green); color: white; }
        .tab-btn.admin-btn { border: 2px solid var(--dark-gray); }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .note-item {
            border-left: 4px solid var(--primary-green);
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        .feedback-item {
            border-left: 4px solid var(--blue-feedback);
            background: #f0f7ff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 10px 10px 0;
        }

        .note-links a {
            display: inline-block;
            background: white;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 6px;
            color: #007bff;
            text-decoration: none;
            margin-right: 10px;
            margin-top: 5px;
            font-weight: 500;
            transition: 0.2s;
        }

        .members-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .member-col {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .user-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; text-align: center; }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
            resize: vertical;
            margin-top: 10px;
            box-sizing: border-box;
        }

        .btn-send-fb {
            margin-top: 10px;
            background: var(--blue-feedback);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header-bar">Pheme: <span id="section-title">Ładowanie...</span></div>

<div class="container">
    <div id="section-code-badge" class="section-badge">
        Kod sekcji: <span id="display-kod"></span>
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'notatki')">Notatki</button>
        <button class="tab-btn" onclick="openTab(event, 'feedback')">Feedback</button>
        <button class="tab-btn" onclick="openTab(event, 'pytania')">Pytania</button>
    </div>

    <div class="content-card">
        <div id="notatki" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Notatki sekcji</h2>
                <button id="btn-pokaz-form-notatki" style="display:none; background: var(--primary-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="document.getElementById('form-dodaj-notatke').style.display='block'">+ Dodaj lekcję</button>
            </div>

            <div id="form-dodaj-notatke" style="display:none; background: #eee; padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                <h3 style="margin-top:0">Nowa lekcja</h3>
                <input type="text" id="note-lesson-name" placeholder="Nazwa lekcji" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
                <input type="url" id="note-link1" placeholder="Link 1" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
                <input type="url" id="note-link2" placeholder="Opcjonalny Link 2" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px;">
                <button onclick="dodajNotatke()" style="background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Zapisz lekcję</button>
                <button onclick="document.getElementById('form-dodaj-notatke').style.display='none'" style="background: #999; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px;">Anuluj</button>
            </div>
            <div id="lista-notatek">Ładowanie materiałów...</div>
        </div>

        <div id="feedback" class="tab-content">
            <h2>Feedback do lekcji</h2>
            <div id="feedback-container">Ładowanie lekcji do feedbacku...</div>
        </div>

        <div id="pytania" class="tab-content">
            <h2>Pytania i Odpowiedzi</h2>
            <p>Sekcja w przygotowaniu...</p>
        </div>

        <div id="lista-czlonkow" class="tab-content">
            <h2>Lista członków sekcji</h2>
            <div class="members-layout">
                <div class="member-col"><h3>Nauczyciele</h3><div id="admins-list"></div></div>
                <div class="member-col"><h3>Uczniowie</h3><div id="users-list"></div></div>
            </div>
        </div>
    </div>

    <a href="sekcje.html" class="back-link">← Wróć do listy sekcji</a>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const kod = params.get('kod');

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        
        try {
            const res = await fetch(`${API_URL}/moje-sekcje`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const sekcje = await res.json();
            const taSekcja = sekcje.find(s => s.kod === kod);

            if (taSekcja) {
                document.getElementById('section-title').innerText = taSekcja.name;
                const czyNauczyciel = taSekcja.rola === "nauczyciel";

                if (czyNauczyciel) {
                    document.getElementById('section-code-badge').style.display = 'block';
                    document.getElementById('display-kod').innerText = kod;
                    document.getElementById('btn-pokaz-form-notatki').style.display = 'block';
                    dodajPrzyciskAdmina();
                    pobierzCzlonkow();
                }

                pobierzNotatki();
                przygotujFeedback(taSekcja.rola);
            }
        } catch (e) { console.error(e); }
    }

    // --- LOGIKA NOTATEK ---
    async function pobierzNotatki() {
        try {
            const res = await fetch(`${API_URL}/section-notes/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const notes = await res.json();
            const container = document.getElementById('lista-notatek');
            
            if (notes.length === 0) {
                container.innerHTML = "<p>Brak dodanych notatek.</p>";
                return;
            }

            const czyNauczyciel = document.getElementById('btn-pokaz-form-notatki').style.display === 'block';

            container.innerHTML = notes.reverse().map(n => {
                const maDrugiLink = n.link2 && n.link2.trim() !== "";
                const tekstLinku1 = maDrugiLink ? "🔗 Notatki 1" : "🔗 Notatki";
                
                return `
                    <div class="note-item">
                        <div style="display: flex; justify-content: space-between;">
                            <div>
                                <small style="color: #888;">${n.date}</small><br>
                                <strong>${n.lessonName}</strong>
                            </div>
                            ${czyNauczyciel ? `<button onclick="usunNotatke('${n.id}')" style="color:red; border:none; background:none; cursor:pointer;">Usuń</button>` : ''}
                        </div>
                        <div class="note-links">
                            <a href="${n.link1}" target="_blank">${tekstLinku1}</a>
                            ${maDrugiLink ? `<a href="${n.link2}" target="_blank">🔗 Notatki 2</a>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) { console.error(e); }
    }

    async function dodajNotatke() {
        const lessonName = document.getElementById('note-lesson-name').value;
        let l1 = document.getElementById('note-link1').value;
        let l2 = document.getElementById('note-link2').value;
        if(!lessonName || !l1) return alert("Uzupełnij dane!");
        
        try {
            const res = await fetch(`${API_URL}/add-note`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, lessonName, link1: l1, link2: l2 })
            });
            if (res.ok) { 
                document.getElementById('form-dodaj-notatke').style.display='none';
                pobierzNotatki();
                const taSekcjaRes = await fetch(`${API_URL}/moje-sekcje`, {headers: {"Authorization": "Bearer "+token}});
                const sekcje = await taSekcjaRes.json();
                const taSekcja = sekcje.find(s => s.kod === kod);
                przygotujFeedback(taSekcja.rola); // Odśwież kafelki feedbacku
            }
        } catch (e) { alert("Błąd!"); }
    }

    async function usunNotatke(noteId) {
        if(!confirm("Usunąć lekcję?")) return;
        try {
            await fetch(`${API_URL}/delete-note/${kod}/${noteId}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            pobierzNotatki();
        } catch (e) { alert("Błąd!"); }
    }

    // --- LOGIKA FEEDBACKU (Kafelki) ---
    async function przygotujFeedback(rola) {
    const container = document.getElementById('feedback-container');
    
    try {
        // 1. Pobieramy lekcje (notatki)
        const notesRes = await fetch(`${API_URL}/section-notes/${kod}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const notes = await notesRes.json();

        // 2. Pobieramy feedbacki
        const fbRes = await fetch(`${API_URL}/section-feedback/${kod}`, {
            headers: { "Authorization": "Bearer " + token }
        });
        const allFeedbacks = await fbRes.json();

        if (rola === "nauczyciel") {
            // --- WIDOK NAUCZYCIELA ---
            if (allFeedbacks.length === 0) {
                container.innerHTML = "<p>Brak nadesłanych opinii od uczniów.</p>";
                return;
            }
            container.innerHTML = "<h3>Otrzymany Feedback:</h3>" + [...allFeedbacks].reverse().map(f => `
                <div class="feedback-item" style="background: white;">
                    <small>Lekcja: <strong>${f.lessonName}</strong> | Od: ${f.author} ${f.edited ? '<b style="color:orange;">(EDYTYWANE)</b>' : ''}</small>
                    <div style="margin-top:5px;">${f.message}</div>
                </div>
            `).join('');

        } else {
            // --- WIDOK UCZNIA ---
            if (notes.length === 0) {
                container.innerHTML = "<p>Nauczyciel nie dodał jeszcze żadnych lekcji, do których mógłbyś wystawić opinię.</p>";
                return;
            }

            const profilRes = await fetch(`${API_URL}/profil`, {headers:{"Authorization":"Bearer "+token}});
            const mojProfil = await profilRes.json();

            // KLUCZOWA ZMIANA: Renderujemy kafelki dla KAŻDEJ lekcji, którą dodał nauczyciel
            container.innerHTML = [...notes].reverse().map((n, index) => {
                // Sprawdzamy czy uczeń już wysłał feedback do TEJ konkretnej lekcji
                const mojStaryFB = allFeedbacks.find(f => f.lessonName === n.lessonName && f.username === mojProfil.username);
                
                const istniejacaTresc = mojStaryFB ? mojStaryFB.message : "";
                const czyEdycja = !!mojStaryFB; // true jeśli feedback już istnieje

                return `
                    <div class="feedback-item">
                        <div style="margin-bottom: 8px;">
                            <small style="color: #888;">Lekcja z dnia: ${n.date}</small><br>
                            <strong style="font-size: 1.1rem;">${n.lessonName}</strong>
                        </div>
                        <textarea id="fb-text-${index}" placeholder="Twoja opinia o tej lekcji...">${istniejacaTresc}</textarea>
                        <button class="btn-send-fb" id="btn-fb-${index}" 
                            onclick="obsluzFeedback('${n.lessonName}', ${index}, ${czyEdycja})"
                            style="background: ${czyEdycja ? '#ff9800' : '#007bff'}; width: 100%; margin-top: 10px;">
                            ${czyEdycja ? 'Zaktualizuj swoją opinię' : 'Wyślij opinię'}
                        </button>
                        ${czyEdycja ? `<div style="margin-top: 8px; font-size: 0.8rem; color: #28a745;">Podałeś już opinię do tej lekcji. Możesz ją edytować.</div>` : ''}
                    </div>
                `;
            }).join('');
        }
    } catch (e) { 
        console.error("Błąd feedbacku:", e);
        container.innerHTML = "<p style='color:red;'>Błąd podczas ładowania modułu feedbacku.</p>"; 
    }
}

async function obsluzFeedback(lessonName, index, czyEdycja) {
    const textarea = document.getElementById(`fb-text-${index}`);
    const message = textarea.value.trim();
    if (!message) return alert("Wpisz treść!");

    const endpoint = czyEdycja ? "/edit-feedback" : "/add-feedback";
    const bodyData = czyEdycja 
        ? { code: kod, lessonName, newMessage: message } 
        : { code: kod, lessonName, message };

    try {
        const res = await fetch(`${API_URL}${endpoint}`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify(bodyData)
        });

        if (res.ok) {
            alert(czyEdycja ? "✅ Zmiany zapisane!" : "✅ Opinia wysłana!");
            const taSekcjaRes = await fetch(`${API_URL}/moje-sekcje`, {headers: {"Authorization": "Bearer "+token}});
            const sekcje = await taSekcjaRes.json();
            przygotujFeedback(sekcje.find(s => s.kod === kod).rola); 
        }
    } catch (e) { alert("Błąd połączenia."); }
}

    async function wyslijFeedbackZKafla(lessonName, index) {
        const textarea = document.getElementById(`fb-text-${index}`);
        const message = textarea.value.trim();

        if (!message) return alert("Wpisz treść opinii!");

        try {
            const res = await fetch(`${API_URL}/add-feedback`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, lessonName, message })
            });

            if (res.ok) {
                alert("✅ Opinia wysłana!");
                textarea.value = "";
            } else {
                alert("Błąd wysyłania.");
            }
        } catch (e) { alert("Błąd połączenia."); }
    }

    // --- CZŁONKOWIE I TABY ---
    function dodajPrzyciskAdmina() {
        const tabs = document.getElementById('tabs-container');
        if (document.querySelector('.admin-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'tab-btn admin-btn';
        btn.innerText = 'Lista członków';
        btn.onclick = (e) => openTab(e, 'lista-czlonkow');
        tabs.appendChild(btn);
    }

    async function pobierzCzlonkow() {
        try {
            const profilRes = await fetch(`${API_URL}/profil`, { headers: { "Authorization": "Bearer " + token } });
            const profil = await profilRes.json();
            const czyJestemAdminemSystemu = (profil.role === "admin");

            const res = await fetch(`${API_URL}/section-members/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const members = await res.json();

            const aL = document.getElementById('admins-list');
            const uL = document.getElementById('users-list');
            aL.innerHTML = ""; uL.innerHTML = "";

            members.forEach(m => {
                const name = m.name && m.name.trim() !== "" ? m.name : m.username;
                if (m.role === "nauczyciel" || m.role === "admin") {
                    aL.insertAdjacentHTML('beforeend', `<div class="user-row"><strong>${name}</strong></div>`);
                } else {
                    let btn = czyJestemAdminemSystemu 
                        ? `<button onclick="awansujNaNaunczyciela('${m.username}')" style="padding: 2px 8px; font-size: 0.7rem; background: #ff3b3b; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Daj Nauczyciela</button>` 
                        : "";
                    uL.insertAdjacentHTML('beforeend', `<div class="user-row" style="display: flex; justify-content: space-between; align-items: center;"><span>${name}</span>${btn}</div>`);
                }
            });
        } catch (e) { console.error(e); }
    }

    async function awansujNaNaunczyciela(targetUsername) {
    if (!confirm(`Nadać uprawnienia nauczyciela dla ${targetUsername}?`)) return;
    try {
        const res = await fetch(`${API_URL}/promote-to-teacher`, {
            method: "POST",
            headers: { 
                "Content-Type": "application/json", 
                "Authorization": "Bearer " + token 
            },
            body: JSON.stringify({ code: kod, targetUsername: targetUsername }) // upewnij się, że 'kod' jest zdefiniowany globalnie
        });

        if (res.ok) { 
            alert("✅ Sukces! Użytkownik jest teraz nauczycielem."); 
            pobierzCzlonkow(); 
        } else {
            const err = await res.json();
            alert("Błąd: " + err.message);
        }
    } catch (e) { 
        alert("Błąd połączenia z serwerem."); 
    }
}

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    window.onload = inicjalizuj;
</script>

</body>
</html>
