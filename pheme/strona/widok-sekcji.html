<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Widok Sekcji</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 30px;
            position: relative;
        }

        .section-badge {
            position: absolute;
            top: -10px;
            right: 0;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-right: 4px solid var(--primary-green);
            font-weight: bold;
            color: var(--dark-gray);
            font-size: 0.9rem;
            display: none;
        }

        .section-badge span {
            color: var(--primary-green);
            margin-left: 5px;
            user-select: all;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-green); color: white; }
        .tab-btn.admin-btn { border: 2px solid var(--dark-gray); }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Style dla notatek */
        .note-item {
            border-left: 4px solid var(--primary-green);
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }
        .note-links a {
            color: #007bff;
            text-decoration: none;
            margin-right: 15px;
            font-weight: 500;
        }

        .members-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .member-col {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .member-col h3 { margin-top: 0; font-size: 1.1rem; color: var(--dark-gray); border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; }

        .user-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        .user-row:last-child { border-bottom: none; }
        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; text-align: center; }

        @media (max-width: 600px) {
            .section-badge {
                position: static;
                text-align: center;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

<div class="header-bar">Pheme: <span id="section-title">Ładowanie...</span></div>

<div class="container">
    <div id="section-code-badge" class="section-badge">
        Kod sekcji: <span id="display-kod"></span>
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'notatki')">Notatki</button>
        <button class="tab-btn" onclick="openTab(event, 'feedback')">Feedback</button>
        <button class="tab-btn" onclick="openTab(event, 'pytania')">Pytania</button>
    </div>

    <div class="content-card">
        <div id="notatki" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Notatki sekcji</h2>
                <button id="btn-pokaz-form-notatki" style="display:none; background: var(--primary-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="document.getElementById('form-dodaj-notatke').style.display='block'">+ Dodaj lekcję</button>
            </div>

            <div id="form-dodaj-notatke" style="display:none; background: #eee; padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                <h3 style="margin-top:0">Nowa lekcja</h3>
                <input type="text" id="note-lesson-name" placeholder="Nazwa lekcji" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
                <input type="text" id="note-link1" placeholder="Link do notatek 1" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
                <input type="text" id="note-link2" placeholder="Link do notatek 2 (opcjonalnie)" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box;">
                <button onclick="dodajNotatke()" style="background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Zapisz</button>
                <button onclick="document.getElementById('form-dodaj-notatke').style.display='none'" style="background: #999; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px;">Anuluj</button>
            </div>

            <div id="lista-notatek">Ładowanie materiałów...</div>
        </div>

        <div id="feedback" class="tab-content">
            <h2>Feedback</h2>
            <p>Opinie i uwagi...</p>
        </div>

        <div id="pytania" class="tab-content">
            <h2>Pytania i Odpowiedzi</h2>
            <p>Zadaj pytanie do lekcji...</p>
        </div>

        <div id="lista-czlonkow" class="tab-content">
            <h2>Lista członków sekcji</h2>
            <div class="members-layout">
                <div class="member-col">
                    <h3>Nauczyciele</h3>
                    <div id="admins-list"></div>
                </div>
                <div class="member-col">
                    <h3>Uczniowie</h3>
                    <div id="users-list"></div>
                </div>
            </div>
        </div>
    </div>

    <a href="sekcje.html" class="back-link">← Wróć do listy sekcji</a>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const kod = params.get('kod');

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        
        try {
            const res = await fetch(`${API_URL}/moje-sekcje`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const sekcje = await res.json();
            const taSekcja = sekcje.find(s => s.kod === kod);

            if (taSekcja) {
                document.getElementById('section-title').innerText = taSekcja.name;

                if (taSekcja.rola === "nauczyciel") {
                    const badge = document.getElementById('section-code-badge');
                    document.getElementById('display-kod').innerText = kod;
                    badge.style.display = 'block';

                    document.getElementById('btn-pokaz-form-notatki').style.display = 'block';

                    dodajPrzyciskAdmina();
                    pobierzCzlonkow(); 
                }
                pobierzNotatki();
            }
        } catch (e) { console.error(e); }
    }

    async function pobierzNotatki() {
        try {
            const res = await fetch(`${API_URL}/section-notes/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const notes = await res.json();
            const container = document.getElementById('lista-notatek');
            
            if (notes.length === 0) {
                container.innerHTML = "<p>Brak dodanych notatek dla tej sekcji.</p>";
                return;
            }

            container.innerHTML = notes.reverse().map(n => `
                <div class="note-item">
                    <div style="font-size: 0.75rem; color: #888; margin-bottom: 5px;">${n.date}</div>
                    <strong style="font-size: 1.1rem; display: block; margin-bottom: 10px;">${n.lessonName}</strong>
                    <div class="note-links">
                        <a href="${n.link1}" target="_blank">🔗 Notatki 1</a>
                        ${n.link2 ? `<a href="${n.link2}" target="_blank">🔗 Notatki 2</a>` : ''}
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error("Błąd pobierania notatek", e); }
    }

    async function dodajNotatke() {
        const lessonName = document.getElementById('note-lesson-name').value;
        const link1 = document.getElementById('note-link1').value;
        const link2 = document.getElementById('note-link2').value;

        if (!lessonName || !link1) return alert("Podaj nazwę lekcji i przynajmniej jeden link!");

        try {
            const res = await fetch(`${API_URL}/add-note`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ code: kod, lessonName, link1, link2 })
            });

            if (res.ok) {
                document.getElementById('form-dodaj-notatke').style.display = 'none';
                document.getElementById('note-lesson-name').value = "";
                document.getElementById('note-link1').value = "";
                document.getElementById('note-link2').value = "";
                pobierzNotatki();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        } catch (e) { alert("Błąd połączenia"); }
    }

    function dodajPrzyciskAdmina() {
        const tabsContainer = document.getElementById('tabs-container');
        if (document.querySelector('.admin-btn')) return;

        const btn = document.createElement('button');
        btn.className = 'tab-btn admin-btn';
        btn.innerText = 'Lista członków';
        btn.onclick = (e) => openTab(e, 'lista-czlonkow');
        tabsContainer.appendChild(btn);
    }

    async function pobierzCzlonkow() {
        try {
            const profilRes = await fetch(`${API_URL}/profil`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const profil = await profilRes.json();
            const czyJestemAdminemSystemu = (profil.role === "admin");

            const res = await fetch(`${API_URL}/section-members/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const members = await res.json();

            const adminsList = document.getElementById('admins-list');
            const usersList = document.getElementById('users-list');

            adminsList.innerHTML = "";
            usersList.innerHTML = "";

            members.forEach(m => {
                const doWyswietlenia = m.name && m.name.trim() !== "" ? m.name : m.username;
                
                if (m.role === "nauczyciel" || m.role === "admin") {
                    const row = `<div class="user-row"><strong>${doWyswietlenia}</strong></div>`;
                    adminsList.insertAdjacentHTML('beforeend', row);
                } else {
                    let buttonHtml = "";
                    if (czyJestemAdminemSystemu) {
                        buttonHtml = `
                            <button class="btn-small" onclick="awansujNaNaunczyciela('${m.username}')" 
                                    style="padding: 2px 8px; font-size: 0.7rem; background: #ff3b3b; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                Daj Nauczyciela
                            </button>`;
                    }
                    const row = `
                        <div class="user-row" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>${doWyswietlenia}</span>
                            ${buttonHtml}
                        </div>`;
                    usersList.insertAdjacentHTML('beforeend', row);
                }
            });
        } catch (e) { console.error("Błąd listy osób", e); }
    }

    async function awansujNaNaunczyciela(targetUsername) {
        if (!confirm(`Czy na pewno chcesz nadać uprawnienia nauczyciela użytkownikowi ${targetUsername}?`)) return;
        try {
            const res = await fetch(`${API_URL}/promote-to-teacher`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ code: kod, targetUsername: targetUsername })
            });
            if (res.ok) {
                alert("Sukces!");
                pobierzCzlonkow(); 
            }
        } catch (e) { alert("Błąd!"); }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    window.onload = inicjalizuj;
</script>

</body>
</html>
