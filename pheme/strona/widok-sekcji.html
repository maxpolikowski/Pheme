<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Widok Sekcji</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 30px;
            position: relative; /* Potrzebne do pozycjonowania plakietki */
        }

        /* --- PLAKIETKA Z KODEM (TYLKO NAUCZYCIEL) --- */
        .section-badge {
            position: absolute;
            top: -10px;
            right: 0;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-right: 4px solid var(--primary-green);
            font-weight: bold;
            color: var(--dark-gray);
            font-size: 0.9rem;
            display: none; /* Domyślnie ukryte */
        }

        .section-badge span {
            color: var(--primary-green);
            margin-left: 5px;
            user-select: all; /* Ułatwia kopiowanie kodu */
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-green); color: white; }
        .tab-btn.admin-btn { border: 2px solid var(--dark-gray); }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .members-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .member-col {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .member-col h3 { margin-top: 0; font-size: 1.1rem; color: var(--dark-gray); border-bottom: 2px solid var(--primary-green); padding-bottom: 5px; }

        .user-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            color: #444;
        }

        .user-row:last-child { border-bottom: none; }
        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; text-align: center; }

        @media (max-width: 600px) {
            .section-badge {
                position: static;
                text-align: center;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>

<div class="header-bar">Pheme: <span id="section-title">Ładowanie...</span></div>

<div class="container">
    <div id="section-code-badge" class="section-badge">
        Kod sekcji: <span id="display-kod"></span>
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'notatki')">Notatki</button>
        <button class="tab-btn" onclick="openTab(event, 'feedback')">Feedback</button>
        <button class="tab-btn" onclick="openTab(event, 'pytania')">Pytania</button>
    </div>

    <div class="content-card">
        <div id="notatki" class="tab-content active">
            <h2>Notatki sekcji</h2>
            <p>Treść materiałów edukacyjnych...</p>
        </div>

        <div id="feedback" class="tab-content">
            <h2>Feedback</h2>
            <p>Opinie i uwagi...</p>
        </div>

        <div id="pytania" class="tab-content">
            <h2>Pytania i Odpowiedzi</h2>
            <p>Zadaj pytanie do lekcji...</p>
        </div>

        <div id="lista-czlonkow" class="tab-content">
            <h2>Lista członków sekcji</h2>
            <div class="members-layout">
                <div class="member-col">
                    <h3>Nauczyciele</h3>
                    <div id="admins-list"></div>
                </div>
                <div class="member-col">
                    <h3>Uczniowie</h3>
                    <div id="users-list"></div>
                </div>
            </div>
        </div>
    </div>

    <a href="sekcje.html" class="back-link">← Wróć do listy sekcji</a>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const kod = params.get('kod');

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        
        try {
            const res = await fetch(`${API_URL}/moje-sekcje`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const sekcje = await res.json();
            const taSekcja = sekcje.find(s => s.kod === kod);

            if (taSekcja) {
                document.getElementById('section-title').innerText = taSekcja.name;

                // Sprawdzamy czy użytkownik jest nauczycielem
                if (taSekcja.rola === "nauczyciel") {
                    // POKAŻ KOD SEKCJI
                    const badge = document.getElementById('section-code-badge');
                    document.getElementById('display-kod').innerText = kod;
                    badge.style.display = 'block';

                    dodajPrzyciskAdmina();
                    pobierzCzlonkow(); 
                }
            }
        } catch (e) { console.error(e); }
    }

    function dodajPrzyciskAdmina() {
        const tabsContainer = document.getElementById('tabs-container');
        if (document.querySelector('.admin-btn')) return;

        const btn = document.createElement('button');
        btn.className = 'tab-btn admin-btn';
        btn.innerText = 'Lista członków';
        btn.onclick = (e) => openTab(e, 'lista-czlonkow');
        tabsContainer.appendChild(btn);
    }

    async function pobierzCzlonkow() {
        try {
            const profilRes = await fetch(`${API_URL}/profil`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const profil = await profilRes.json();
            const czyJestemAdminemSystemu = (profil.role === "admin");

            const res = await fetch(`${API_URL}/section-members/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const members = await res.json();

            const adminsList = document.getElementById('admins-list');
            const usersList = document.getElementById('users-list');

            adminsList.innerHTML = "";
            usersList.innerHTML = "";

            members.forEach(m => {
                const doWyswietlenia = m.name && m.name.trim() !== "" ? m.name : m.username;
                
                if (m.role === "nauczyciel" || m.role === "admin") {
                    const row = `<div class="user-row"><strong>${doWyswietlenia}</strong></div>`;
                    adminsList.insertAdjacentHTML('beforeend', row);
                } else {
                    let buttonHtml = "";
                    if (czyJestemAdminemSystemu) {
                        buttonHtml = `
                            <button class="btn-small" onclick="awansujNaNaunczyciela('${m.username}')" 
                                    style="padding: 2px 8px; font-size: 0.7rem; background: #ff3b3b; color: white; border: none; border-radius: 5px; cursor: pointer;">
                                Daj Nauczyciela (Admin Only)
                            </button>`;
                    }

                    const row = `
                        <div class="user-row" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>${doWyswietlenia}</span>
                            ${buttonHtml}
                        </div>`;
                    usersList.insertAdjacentHTML('beforeend', row);
                }
            });
        } catch (e) { console.error("Błąd pobierania listy osób", e); }
    }

    async function awansujNaNaunczyciela(targetUsername) {
        if (!confirm(`Czy na pewno chcesz nadać uprawnienia nauczyciela użytkownikowi ${targetUsername}?`)) return;

        try {
            const res = await fetch(`${API_URL}/promote-to-teacher`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ 
                    code: kod, 
                    targetUsername: targetUsername 
                })
            });

            const data = await res.json();
            
            if (res.ok) {
                alert("Sukces: " + data.message);
                pobierzCzlonkow(); 
            } else {
                alert("Błąd: " + data.message);
            }
        } catch (e) {
            console.error("Błąd sieci:", e);
            alert("Nie udało się połączyć z serwerem.");
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    window.onload = inicjalizuj;
</script>

</body>
</html>
