<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Widok Sekcji</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 30px;
            position: relative;
        }

        .section-badge {
            position: absolute;
            top: -10px;
            right: 0;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-right: 4px solid var(--primary-green);
            font-weight: bold;
            color: var(--dark-gray);
            font-size: 0.9rem;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-green); color: white; }
        .tab-btn.admin-btn { border: 2px solid var(--dark-gray); }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .note-item {
            border-left: 4px solid var(--primary-green);
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        .note-links a {
            display: inline-block;
            background: white;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 6px;
            color: #007bff;
            text-decoration: none;
            margin-right: 10px;
            margin-top: 5px;
            font-weight: 500;
            transition: 0.2s;
        }

        .members-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .member-col {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .user-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .feedback-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #007bff;
        }

        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; text-align: center; }
    </style>
</head>
<body>

<div class="header-bar">Pheme: <span id="section-title">Ładowanie...</span></div>

<div class="container">
    <div id="section-code-badge" class="section-badge">
        Kod sekcji: <span id="display-kod"></span>
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'notatki')">Notatki</button>
        <button class="tab-btn" onclick="openTab(event, 'feedback')">Feedback</button>
        <button class="tab-btn" onclick="openTab(event, 'pytania')">Pytania</button>
    </div>

    <div class="content-card">
        <div id="notatki" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Notatki sekcji</h2>
                <button id="btn-pokaz-form-notatki" style="display:none; background: var(--primary-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="document.getElementById('form-dodaj-notatke').style.display='block'">+ Dodaj lekcję</button>
            </div>

            <div id="form-dodaj-notatke" style="display:none; background: #eee; padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                <h3 style="margin-top:0">Nowa lekcja</h3>
                <input type="text" id="note-lesson-name" placeholder="Nazwa lekcji" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
                <input type="url" id="note-link1" placeholder="Link 1" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
                <input type="url" id="note-link2" placeholder="Opcjonalny Link 2" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px;">
                <button onclick="dodajNotatke()" style="background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Zapisz lekcję</button>
                <button onclick="document.getElementById('form-dodaj-notatke').style.display='none'" style="background: #999; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px;">Anuluj</button>
            </div>
            <div id="lista-notatek">Ładowanie materiałów...</div>
        </div>

        <div id="feedback" class="tab-content">
            <h2>Feedback do lekcji</h2>
            
            <div id="feedback-form-container" style="display:none; background: #f0f7ff; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #cce5ff;">
                <h3 style="margin-top:0">Wyślij opinię</h3>
                <select id="feedback-lesson-select" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px;">
                    <option value="">Wybierz lekcję...</option>
                </select>
                <textarea id="feedback-text" placeholder="Twoja opinia do tej lekcji..." style="width: 100%; padding: 10px; height: 80px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit;"></textarea>
                <button onclick="wyslijFeedback()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">Wyślij wiadomość</button>
            </div>

            <div id="feedback-admin-list" style="display:none;">
                <h3>Ostatnio napisane feedbacki</h3>
                <div id="lista-odebranych-feedbackow">Ładowanie...</div>
            </div>
        </div>

        <div id="pytania" class="tab-content">
            <h2>Pytania i Odpowiedzi</h2>
            <p>Sekcja w przygotowaniu...</p>
        </div>

        <div id="lista-czlonkow" class="tab-content">
            <h2>Lista członków sekcji</h2>
            <div class="members-layout">
                <div class="member-col"><h3>Nauczyciele</h3><div id="admins-list"></div></div>
                <div class="member-col"><h3>Uczniowie</h3><div id="users-list"></div></div>
            </div>
        </div>
    </div>

    <a href="sekcje.html" class="back-link">← Wróć do listy sekcji</a>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const kod = params.get('kod');

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        
        try {
            const res = await fetch(`${API_URL}/moje-sekcje`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const sekcje = await res.json();
            const taSekcja = sekcje.find(s => s.kod === kod);

            if (taSekcja) {
                document.getElementById('section-title').innerText = taSekcja.name;
                const czyNauczyciel = taSekcja.rola === "nauczyciel";

                if (czyNauczyciel) {
                    document.getElementById('section-code-badge').style.display = 'block';
                    document.getElementById('display-kod').innerText = kod;
                    document.getElementById('btn-pokaz-form-notatki').style.display = 'block';
                    dodajPrzyciskAdmina();
                    pobierzCzlonkow();
                }

                pobierzNotatki();
                przygotujFeedback(taSekcja.rola);
            }
        } catch (e) { console.error(e); }
    }

    // --- LOGIKA NOTATEK ---
    async function pobierzNotatki() {
        try {
            const res = await fetch(`${API_URL}/section-notes/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const notes = await res.json();
            const container = document.getElementById('lista-notatek');
            const selectFeedback = document.getElementById('feedback-lesson-select');
            
            if (notes.length === 0) {
                container.innerHTML = "<p>Brak dodanych notatek.</p>";
                return;
            }

            // Aktualizacja selecta w feedbacku
            selectFeedback.innerHTML = '<option value="">Wybierz lekcję...</option>';
            
            const czyNauczyciel = document.getElementById('btn-pokaz-form-notatki').style.display === 'block';

            container.innerHTML = notes.reverse().map(n => {
                // Dodaj lekcję do selecta
                const opt = document.createElement('option');
                opt.value = n.lessonName; opt.innerText = n.lessonName;
                selectFeedback.appendChild(opt);

                const maDrugiLink = n.link2 && n.link2.trim() !== "";
                const tekstLinku1 = maDrugiLink ? "🔗 Notatki 1" : "🔗 Notatki";
                
                return `
                    <div class="note-item">
                        <div style="display: flex; justify-content: space-between;">
                            <div>
                                <small style="color: #888;">${n.date}</small><br>
                                <strong>${n.lessonName}</strong>
                            </div>
                            ${czyNauczyciel ? `<button onclick="usunNotatke('${n.id}')" style="color:red; border:none; background:none; cursor:pointer;">Usuń</button>` : ''}
                        </div>
                        <div class="note-links">
                            <a href="${n.link1}" target="_blank">${tekstLinku1}</a>
                            ${maDrugiLink ? `<a href="${n.link2}" target="_blank">🔗 Notatki 2</a>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        } catch (e) { console.error(e); }
    }

    async function dodajNotatke() {
        const lessonName = document.getElementById('note-lesson-name').value;
        let l1 = document.getElementById('note-link1').value;
        let l2 = document.getElementById('note-link2').value;
        if(!lessonName || !l1) return alert("Uzupełnij dane!");
        
        try {
            const res = await fetch(`${API_URL}/add-note`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, lessonName, link1: l1, link2: l2 })
            });
            if (res.ok) { 
                document.getElementById('form-dodaj-notatke').style.display='none';
                pobierzNotatki(); 
            }
        } catch (e) { alert("Błąd!"); }
    }

    // --- LOGIKA FEEDBACKU ---
    function przygotujFeedback(rola) {
        if (rola === "nauczyciel") {
            document.getElementById('feedback-admin-list').style.display = 'block';
            pobierzWszystkieFeedbacki();
        } else {
            document.getElementById('feedback-form-container').style.display = 'block';
        }
    }

    async function wyslijFeedback() {
        const lessonSelect = document.getElementById('feedback-lesson-select');
        const feedbackText = document.getElementById('feedback-text');
        
        const lessonName = lessonSelect.value;
        const message = feedbackText.value.trim();

        if (!lessonName || !message) {
            return alert("Proszę wybrać lekcję i wpisać treść wiadomości!");
        }

        try {
            console.log("Wysyłanie feedbacku dla sekcji:", kod); // Debugowanie w konsoli (F12)

            const res = await fetch(`${API_URL}/add-feedback`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ 
                    code: kod,          // Upewnij się, że to zmienna 'kod' z góry skryptu
                    lessonName: lessonName, 
                    message: message 
                })
            });

            if (res.ok) {
                alert("✅ Wiadomość została wysłana do nauczyciela!");
                feedbackText.value = ""; // Czyścimy pole tekstowe
                lessonSelect.selectedIndex = 0; // Resetujemy listę lekcji
            } else {
                const err = await res.json();
                alert("Błąd serwera: " + (err.message || "Nie udało się wysłać wiadomości."));
            }
        } catch (e) {
            console.error("Błąd połączenia:", e);
            alert("Błąd połączenia z serwerem. Sprawdź konsolę (F12).");
        }
    }

    async function pobierzWszystkieFeedbacki() {
        try {
            const res = await fetch(`${API_URL}/section-feedback/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const feedbacks = await res.json();
            const container = document.getElementById('lista-odebranych-feedbackow');
            
            container.innerHTML = feedbacks.reverse().map(f => `
                <div class="feedback-card">
                    <small>Lekcja: <strong>${f.lessonName}</strong> | Od: ${f.author || 'Uczeń'}</small>
                    <div style="margin-top:5px;">${f.message}</div>
                </div>
            `).join('') || "<p>Brak feedbacku.</p>";
        } catch (e) { console.error(e); }
    }

    // --- CZŁONKOWIE I TABY ---
    function dodajPrzyciskAdmina() {
        const tabs = document.getElementById('tabs-container');
        if (document.querySelector('.admin-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'tab-btn admin-btn';
        btn.innerText = 'Lista członków';
        btn.onclick = (e) => openTab(e, 'lista-czlonkow');
        tabs.appendChild(btn);
    }

    async function pobierzCzlonkow() {
        try {
            // 1. Najpierw sprawdzamy Twój profil, żeby wiedzieć czy jesteś Adminem systemu
            const profilRes = await fetch(`${API_URL}/profil`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const profil = await profilRes.json();
            const czyJestemAdminemSystemu = (profil.role === "admin");

            // 2. Pobieramy listę członków sekcji
            const res = await fetch(`${API_URL}/section-members/${kod}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const members = await res.json();

            const adminsList = document.getElementById('admins-list');
            const usersList = document.getElementById('users-list');

            adminsList.innerHTML = "";
            usersList.innerHTML = "";

            members.forEach(m => {
                const doWyswietlenia = m.name && m.name.trim() !== "" ? m.name : m.username;
                
                if (m.role === "nauczyciel" || m.role === "admin") {
                    adminsList.insertAdjacentHTML('beforeend', `<div class="user-row"><strong>${doWyswietlenia}</strong></div>`);
                } else {
                    // Jeśli jesteś adminem systemu, dodajemy przycisk awansu
                    let buttonHtml = czyJestemAdminemSystemu 
                        ? `<button onclick="awansujNaNaunczyciela('${m.username}')" style="padding: 2px 8px; font-size: 0.7rem; background: #ff3b3b; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px;">Awansuj na nauczyciela / tylko admini</button>` 
                        : "";
                    
                    usersList.insertAdjacentHTML('beforeend', `
                        <div class="user-row" style="display: flex; justify-content: space-between; align-items: center;">
                            <span>${doWyswietlenia}</span>
                            ${buttonHtml}
                        </div>
                    `);
                }
            });
        } catch (e) { console.error("Błąd listy osób", e); }
    }

    async function awansujNaNaunczyciela(targetUsername) {
        if (!confirm(`Czy na pewno chcesz nadać uprawnienia nauczyciela użytkownikowi ${targetUsername}?`)) return;
        try {
            const res = await fetch(`${API_URL}/promote-to-teacher`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": "Bearer " + token 
                },
                body: JSON.stringify({ code: kod, targetUsername: targetUsername })
            });
            
            if (res.ok) { 
                alert("Użytkownik został nauczycielem w tej sekcji!"); 
                pobierzCzlonkow(); 
            } else {
                const err = await res.json();
                alert("Błąd: " + err.message);
            }
        } catch (e) { alert("Błąd połączenia!"); }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    window.onload = inicjalizuj;
</script>

</body>
</html>
