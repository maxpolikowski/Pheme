<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Widok Sekcji</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #f5f5f5;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
            --blue-feedback: #007bff;
            --orange-edit: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin-top: 30px;
            padding: 0 15px;
            box-sizing: border-box;
            position: relative;
        }

        .section-badge {
            position: absolute;
            top: -45px;
            right: 15px;
            background: white;
            padding: 8px 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-right: 4px solid var(--primary-green);
            font-weight: bold;
            color: var(--dark-gray);
            font-size: 0.9rem;
            display: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .tab-btn.active { background: var(--primary-green); color: white; }
        .tab-btn.admin-btn { border: 2px solid var(--dark-gray); }

        .content-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            min-height: 400px;
            width: 100%;
            box-sizing: border-box;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .note-item {
            border-left: 4px solid var(--primary-green);
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        .feedback-item {
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 0 10px 10px 0;
        }

        .btn-send-fb {
            width: 100%;
            margin-top: 10px;
            border: none;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: background 0.3s ease;
        }

        #pytania .btn-send-fb {
            background-color: var(--blue-feedback);
        }

        textarea, .input-subject {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-family: inherit;
            box-sizing: border-box;
            margin-top: 10px;
        }

        textarea { resize: vertical; }

        .note-links a {
            display: inline-block;
            background: white;
            border: 1px solid #ddd;
            padding: 5px 12px;
            border-radius: 6px;
            color: #007bff;
            text-decoration: none;
            margin-right: 10px;
            margin-top: 5px;
            font-weight: 500;
        }

        .members-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .member-col {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .user-row {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; text-align: center; }
    </style>
</head>
<body>

<div class="header-bar">Pheme: <span id="section-title">Ładowanie...</span></div>

<div class="container">
    <div id="section-code-badge" class="section-badge">
        Kod sekcji: <span id="display-kod"></span>
    </div>

    <div class="tabs" id="tabs-container">
        <button class="tab-btn active" onclick="openTab(event, 'notatki')">Notatki</button>
        <button class="tab-btn" onclick="openTab(event, 'feedback')">Feedback</button>
        <button class="tab-btn" onclick="openTab(event, 'pytania')">Pytania</button>
    </div>

    <div class="content-card">
        <div id="notatki" class="tab-content active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>Notatki sekcji</h2>
                <button id="btn-pokaz-form-notatki" style="display:none; background: var(--primary-green); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;" onclick="document.getElementById('form-dodaj-notatke').style.display='block'">+ Dodaj lekcję</button>
            </div>
            <div id="form-dodaj-notatke" style="display:none; background: #eee; padding: 20px; border-radius: 15px; margin-bottom: 25px;">
                <h3 style="margin-top:0">Nowa lekcja</h3>
                <input type="text" id="note-lesson-name" placeholder="Nazwa lekcji" class="input-subject" style="margin-top:0">
                <input type="url" id="note-link1" placeholder="Link 1" class="input-subject">
                <input type="url" id="note-link2" placeholder="Opcjonalny Link 2" class="input-subject">
                <button onclick="dodajNotatke()" style="background: var(--primary-green); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top:10px;">Zapisz lekcję</button>
                <button onclick="document.getElementById('form-dodaj-notatke').style.display='none'" style="background: #999; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-left: 10px;">Anuluj</button>
            </div>
            <div id="lista-notatek">Ładowanie materiałów...</div>
        </div>

        <div id="feedback" class="tab-content">
            <h2>Feedback do lekcji</h2>
            <div id="feedback-container">Ładowanie lekcji...</div>
        </div>

        <div id="pytania" class="tab-content">
            <h2>Pytania i Odpowiedzi</h2>
            <div id="pytania-container">Ładowanie modułu...</div>
        </div>

        <div id="lista-czlonkow" class="tab-content">
            <h2>Lista członków sekcji</h2>
            <div class="members-layout">
                <div class="member-col"><h3>Nauczyciele</h3><div id="admins-list"></div></div>
                <div class="member-col"><h3>Uczniowie</h3><div id="users-list"></div></div>
            </div>
        </div>
    </div>

    <a href="sekcje.html" class="back-link">← Wróć do listy sekcji</a>
</div>

<script>
    const API_URL = "https://pheme-spmz.onrender.com";
    const token = localStorage.getItem("token");
    const params = new URLSearchParams(window.location.search);
    const kod = params.get('kod');

    async function inicjalizuj() {
        if (!token) window.location.href = "index.html";
        try {
            const res = await fetch(`${API_URL}/moje-sekcje`, { headers: { "Authorization": "Bearer " + token } });
            const sekcje = await res.json();
            const taSekcja = sekcje.find(s => s.kod === kod);

            if (taSekcja) {
                document.getElementById('section-title').innerText = taSekcja.name;
                const czyNauczyciel = taSekcja.rola === "nauczyciel";
                if (czyNauczyciel) {
                    document.getElementById('section-code-badge').style.display = 'block';
                    document.getElementById('display-kod').innerText = kod;
                    document.getElementById('btn-pokaz-form-notatki').style.display = 'block';
                    dodajPrzyciskAdmina();
                    pobierzCzlonkow();
                }
                pobierzNotatki();
                przygotujFeedback(taSekcja.rola);
            }
        } catch (e) { console.error(e); }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
        if (tabName === 'pytania') przygotujPytania();
        if (tabName === 'lista-czlonkow') pobierzCzlonkow();
    }

    async function pobierzNotatki() {
        try {
            const res = await fetch(`${API_URL}/section-notes/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const notes = await res.json();
            const sekcjeRes = await fetch(`${API_URL}/moje-sekcje`, { headers: { "Authorization": "Bearer " + token } });
            const sekcje = await sekcjeRes.json();
            const taSekcja = sekcje.find(s => s.kod === kod);
            const czyNauczyciel = taSekcja && taSekcja.rola === "nauczyciel";
            const container = document.getElementById('lista-notatek');
            if (!notes || notes.length === 0) { container.innerHTML = "<p>Brak notatek.</p>"; return; }
            container.innerHTML = [...notes].reverse().map(n => `
                <div class="note-item">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div>
                            <small>${n.date}</small><br><strong>${n.lessonName}</strong>
                        </div>
                        ${czyNauczyciel ? `<button onclick="usunNotatke('${n.id}')" style="background:none; border:none; color:red; cursor:pointer; font-size:0.8rem;">Usuń</button>` : ''}
                    </div>
                    <div class="note-links">
                        <a href="${n.link1}" target="_blank">🔗 Link 1</a>
                        ${n.link2 ? `<a href="${n.link2}" target="_blank">🔗 Link 2</a>` : ''}
                    </div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function dodajNotatke() {
        const lessonName = document.getElementById('note-lesson-name').value.trim();
        const link1 = document.getElementById('note-link1').value.trim();
        const link2 = document.getElementById('note-link2').value.trim();
        if (!lessonName || !link1) return alert("Podaj nazwę lekcji i przynajmniej pierwszy link!");
        try {
            const res = await fetch(`${API_URL}/add-note`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, lessonName, link1, link2 })
            });
            if (res.ok) {
                alert("✅ Lekcja dodana!");
                document.getElementById('form-dodaj-notatke').style.display = 'none';
                document.getElementById('note-lesson-name').value = "";
                document.getElementById('note-link1').value = "";
                document.getElementById('note-link2').value = "";
                pobierzNotatki();
            } else {
                const err = await res.json();
                alert("Błąd: " + err.message);
            }
        } catch (e) { console.error(e); }
    }

    async function usunNotatke(noteId) {
        if (!confirm("Czy na pewno chcesz usunąć tę lekcję?")) return;
        try {
            const res = await fetch(`${API_URL}/delete-note/${kod}/${noteId}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) pobierzNotatki();
        } catch (e) { console.error(e); }
    }

    async function przygotujFeedback(rola) {
        const container = document.getElementById('feedback-container');
        try {
            const notesRes = await fetch(`${API_URL}/section-notes/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const notes = await notesRes.json();
            const fbRes = await fetch(`${API_URL}/section-feedback/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const allFeedbacks = await fbRes.json();

            if (rola === "nauczyciel") {
                container.innerHTML = allFeedbacks.reverse().map(f => {
                    const etykietaEdytowano = f.edited ? `<span style="color:var(--orange-edit); font-size:0.75rem; margin-left:10px;">(edytowano)</span>` : "";
                    
                    return `
                        <div class="feedback-item" style="background:white; border-left: 4px solid var(--blue-feedback); box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                            <small>Lekcja: <strong>${f.lessonName}</strong> | Od: ${f.author}${etykietaEdytowano}</small>
                            <div style="margin-top:5px;">${f.message}</div>
                        </div>
                    `;
                }).join('');
            } else {
                const profRes = await fetch(`${API_URL}/profil`, {headers:{"Authorization":"Bearer "+token}});
                const profil = await profRes.json();
                container.innerHTML = [...notes].reverse().map((n, i) => {
                    const mojFB = allFeedbacks.find(f => f.lessonName === n.lessonName && f.username === profil.username);
                    const czyEdycja = !!mojFB;
                    const kolorBtn = czyEdycja ? "var(--orange-edit)" : "var(--blue-feedback)";
                    const etykietaEdytowano = czyEdycja ? `<span style="color:var(--orange-edit); font-size:0.75rem; margin-left:10px;">(edytowano)</span>` : "";
                    
                    return `
                        <div class="feedback-item" style="border-left: 4px solid ${kolorBtn}; background: #f9f9f9;">
                            <strong>${n.lessonName}</strong>${etykietaEdytowano}<br>
                            <textarea id="fb-text-${i}">${czyEdycja ? mojFB.message : ""}</textarea>
                            <button class="btn-send-fb" onclick="obsluzFeedback('${n.lessonName}', ${i}, ${czyEdycja})" style="background-color: ${kolorBtn};">
                                ${czyEdycja ? 'Zaktualizuj opinię' : 'Wyślij opinię'}
                            </button>
                        </div>
                    `;
                }).join('');
            }
        } catch (e) { console.error(e); }
    }

    async function obsluzFeedback(lessonName, index, czyEdycja) {
        const msg = document.getElementById(`fb-text-${index}`).value.trim();
        if (!msg) return alert("Wpisz treść!");
        const endpoint = czyEdycja ? "/edit-feedback" : "/add-feedback";
        await fetch(`${API_URL}${endpoint}`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ code: kod, lessonName, message: msg, newMessage: msg })
        });
        alert("✅ Zapisano!");
        inicjalizuj();
    }

    async function przygotujPytania() {
        const container = document.getElementById('pytania-container');
        try {
            const memRes = await fetch(`${API_URL}/section-members/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const members = await memRes.json();
            const teachers = members.filter(m => m.role === "nauczyciel");
            const qRes = await fetch(`${API_URL}/section-questions/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const questions = await qRes.json();
            
            // Górna sekcja - utworzenie nowego wątku
            let html = `
                <div style="background:#f0f0f0; padding:20px; border-radius:15px; margin-bottom:20px;">
                    <h3 style="margin-top:0">Rozpocznij nowy wątek</h3>
                    <div style="margin-bottom:10px;">
                        ${teachers.map(t => `<label style="margin-right:15px;"><input type="checkbox" name="targetT" value="${t.username}"> ${t.name || t.username}</label>`).join('')}
                    </div>
                    <input type="text" id="q-subject" placeholder="Temat..." class="input-subject" style="margin-top:0">
                    <textarea id="q-text" placeholder="Twoja pierwsza wiadomość..."></textarea>
                    <button class="btn-send-fb" onclick="wyslijPytanie()">Wyślij nową wiadomość</button>
                </div>
                <div id="q-list">
            `;

            // Renderowanie listy wątków
            if (questions.length === 0) {
                html += '<p>Brak konwersacji.</p>';
            } else {
                html += questions.reverse().map(q => {
                    const questionId = q.id || q._id; // Pobieramy ID pytania z backendu
                    
                    return `
                    <div class="feedback-item" style="border-left: 4px solid purple; background:white; box-shadow:0 2px 5px rgba(0,0,0,0.05); margin-bottom: 30px;">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <strong>Temat: ${q.subject || 'Brak tematu'}</strong>
                            <small style="color:#aaa">${q.date || ''}</small>
                        </div>
                        <small>Uczestnicy: <strong>${q.from}</strong> oraz ${q.to.join(', ')}</small>
                        <p style="margin:15px 0 10px 0; white-space: pre-wrap; font-size: 1.05rem;">${q.text}</p>
                        
                        <div style="margin-top: 20px; padding-left: 15px; border-left: 2px solid #ddd;">
                            ${(q.replies || []).map(r => `
                                <div style="background: #fdfdfd; padding: 12px 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #eee;">
                                    <div style="display:flex; justify-content:space-between;">
                                        <small><strong>${r.from}</strong></small>
                                        <small style="color:#888">${r.date || ''}</small>
                                    </div>
                                    <p style="margin: 5px 0 0 0; white-space: pre-wrap; font-size: 0.95rem; color: #444;">${r.text}</p>
                                </div>
                            `).join('')}
                            
                            <div style="margin-top: 15px; display: flex; gap: 10px; align-items: flex-start;">
                                <textarea id="reply-text-${questionId}" placeholder="Napisz odpowiedź do tego wątku..." style="margin-top:0; min-height: 45px; padding: 10px; border-radius: 8px; border: 1px solid #ccc; flex-grow: 1; resize: vertical; font-family: inherit; box-sizing: border-box;"></textarea>
                                <button onclick="wyslijOdpowiedz('${questionId}')" style="background: purple; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.2s;">Odpowiedz</button>
                            </div>
                        </div>
                    </div>
                `}).join('');
            }
            
            html += `</div>`;
            container.innerHTML = html;
            
        } catch (e) { container.innerHTML = "Błąd modułu pytań."; }
    }

    async function wyslijPytanie() {
        const subject = document.getElementById('q-subject').value.trim();
        const text = document.getElementById('q-text').value.trim();
        const recipients = Array.from(document.querySelectorAll('input[name="targetT"]:checked')).map(cb => cb.value);
        if(!subject || !text || recipients.length === 0) return alert("Uzupełnij temat, treść i wybierz adresata!");
        
        try {
            const res = await fetch(`${API_URL}/ask-question`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, subject: subject, question: text, recipients })
            });
            if(res.ok) { alert("✅ Nowy wątek rozpoczęty!"); przygotujPytania(); }
        } catch (e) { alert("Błąd wysyłania wiadomości."); }
    }

    // Nowa funkcja do obsługi wysyłania odpowiedzi w wątku
    async function wyslijOdpowiedz(questionId) {
        if (!questionId || questionId === 'undefined') {
            return alert("Błąd: Pytanie nie posiada ID w bazie danych.");
        }
        
        const replyText = document.getElementById(`reply-text-${questionId}`).value.trim();
        if (!replyText) return alert("Wpisz treść odpowiedzi!");

        try {
            // TUTAJ ZAKŁADAMY ISTNIENIE ENDPOINTU /reply-question PO STRONIE BACKENDU
            const res = await fetch(`${API_URL}/reply-question`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, questionId: questionId, text: replyText })
            });
            
            if (res.ok) {
                document.getElementById(`reply-text-${questionId}`).value = "";
                przygotujPytania(); // Odświeżamy widok, by pokazać nową odpowiedź
            } else {
                alert("Błąd serwera podczas zapisywania odpowiedzi.");
            }
        } catch (e) {
            alert("Błąd połączenia z serwerem.");
        }
    }

    function dodajPrzyciskAdmina() {
        if (document.querySelector('.admin-btn')) return;
        const btn = document.createElement('button');
        btn.className = 'tab-btn admin-btn';
        btn.innerText = 'Lista członków';
        btn.onclick = (e) => openTab(e, 'lista-czlonkow');
        document.getElementById('tabs-container').appendChild(btn);
    }

    async function pobierzCzlonkow() {
        try {
            const profRes = await fetch(`${API_URL}/profil`, { headers: { "Authorization": "Bearer " + token } });
            const profil = await profRes.json();
            const res = await fetch(`${API_URL}/section-members/${kod}`, { headers: { "Authorization": "Bearer " + token } });
            const members = await res.json();
            const jaWsekcji = members.find(m => m.username === profil.username);
            const mozeNadawac = profil.role === "admin" && (jaWsekcji && jaWsekcji.role === "nauczyciel");
            const aL = document.getElementById('admins-list');
            const uL = document.getElementById('users-list');
            aL.innerHTML = ""; uL.innerHTML = "";
            members.forEach(m => {
                const name = m.name || m.username;
                if (m.role === "nauczyciel") {
                    aL.innerHTML += `<div class="user-row"><strong>⭐ ${name}</strong></div>`;
                } else {
                    const btnAwans = mozeNadawac 
                        ? `<button onclick="awansujNaNauczyciela('${m.username}')" style="margin-left:10px; font-size:0.7rem; cursor:pointer; background:var(--primary-green); color:white; border:none; border-radius:4px; padding:2px 5px;">Daj nauczyciela</button>` 
                        : "";
                    uL.innerHTML += `<div class="user-row">${name}${btnAwans}</div>`;
                }
            });
        } catch (e) { console.error(e); }
    }

    async function awansujNaNauczyciela(targetUsername) {
        if (!confirm(`Mianować ${targetUsername} nauczycielem?`)) return;
        try {
            const res = await fetch(`${API_URL}/promote-to-teacher`, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({ code: kod, targetUsername })
            });
            if (res.ok) { alert("✅ Awansowano!"); pobierzCzlonkow(); }
        } catch (e) { alert("Błąd połączenia."); }
    }

    window.onload = inicjalizuj;
</script>
</body>
</html>
