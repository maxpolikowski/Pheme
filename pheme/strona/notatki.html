<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pheme - Notatki PDF</title>
    <style>
        :root {
            --primary-green: #00ce52;
            --bg-gray: #e0e0e0;
            --dark-gray: #333333;
            --red-header: #ff3b3b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gray);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%;
            background: linear-gradient(to right, #ffffff, var(--red-header));
            text-align: center;
            padding: 10px 0;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 1000px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px); /* Dopasowanie do wysokości ekranu */
        }

        .nav-menu {
            display: flex;
            justify-content: center;
            margin-bottom: 15px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: var(--dark-gray);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .card {
            background: white;
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            flex-grow: 1; /* Karta wypełni resztę miejsca */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Styl dla osadzonego PDF */
        #pdfViewer {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        .no-pdf {
            padding: 40px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>

<div class="header-bar">Pheme - NOTATKI I MATERIAŁY</div>

<div class="container">
    <div class="nav-menu">
        <a href="index.html" class="nav-btn">← Powrót do menu</a>
    </div>

    <div class="card">
        <iframe src="notatki.pdf" id="pdfViewer">
            <div class="no-pdf">
                Twoja przeglądarka nie obsługuje wyświetlania PDF. 
                <a href="notatki.pdf">Pobierz plik PDF</a>
            </div>
        </iframe>
    </div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) {
        window.location.href = "index.html";
    }
</script>

</body>
</html>
